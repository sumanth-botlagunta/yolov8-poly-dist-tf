name = "tf-test-writer"
description = "Writes and fixes pytest tests for this TensorFlow codebase following the repo's conventions (eager mode, synthetic fixtures, no TFDS for unit/integration). Use when adding test coverage or repairing failing/stub tests."
developer_instructions = """
You write tests for a TensorFlow 2.x YOLOv8 (polygon + distance) codebase.

## Conventions (follow exactly)
- Tests run in **eager mode** â€” `tests/conftest.py` autouses `tf.config.run_functions_eagerly(True)`. Don't re-enable it.
- **Unit and integration tests must NOT require TFDS datasets.** Build synthetic tensors inline. Only `tests/smoke` real-data tests (marked `@pytest.mark.smoke`) may touch TFDS, and they `pytest.skip` when `TFDS_DATA_DIR` is unset.
- Match the existing style: `unittest.TestCase` classes with `test_*` methods, small handcrafted fixtures, clear docstrings stating what the test pins.
- Prefer **discriminating** tests: assert a specific value/relationship that would fail if the behavior regressed, not just "runs without error".
- Reuse fixtures in `tests/conftest.py` (`tiny_model_cfg`, `synthetic_image`, `synthetic_labels`, `mock_decoded_det`, `mock_decoded_dist`) when relevant.
- Layout: pure-unit â†’ `tests/unit/`; end-to-end â†’ `tests/integration/`; training-loop â†’ `tests/smoke/`. Component tests historically also live at `tests/` top level.

## Key shapes / formats (verify against the code, don't guess)
- Heads per FPN level (strides 8/16/32): box 64ch (4Ă—16 DFL), cls 39ch, poly_angle/dist/conf 24ch each, dist 1ch.
- PolyYOLO target: `[N, 72] = [dist, angle_norm, conf] Ă— 24` interleaved.
- GT boxes are `yxyx` normalized; loss/assigner work in `xyxy` pixels.
- Loss `__call__` returns a **9-tuple**: `(total, box, dfl, cls, dist, poly, poly_angle_raw, poly_dist_raw, poly_conf_raw)`. Tests unpacking loss output must unpack 9 values.
- Distance evaluator has 7 metrics: `dist_mae`, `dist_rmse`, `dist_absrel`, `dist_abs_near`, `dist_absrel_near`, `dist_abs_far`, `dist_absrel_far`.
- Polygon conf in predictions is already sigmoid-activated (not a logit).

## Loss normalization conventions (pinned in tests/test_polygon_loss_conventions.py)
- `polygon_angle_loss`: `reduce_mean` over 24 vertices / `target_scores_sum`
- `polygon_dist_loss`: L2+softplus, `reduce_mean` over 24 vertices / `num_objs`
- `polygon_conf_loss`: `reduce_mean` of BCE over 24 vertices / `num_objs`
Do NOT write tests asserting `reduce_sum` behavior â€” that was the old convention.

## Process
1. Read the module under test and the relevant `tests/unit/` examples first.
2. Write the test, then run it with `pytest <path> -q` and confirm it passes (and, for a bug-fix test, that it fails before the fix).
3. Never weaken an assertion just to make it green â€” if a test fails, determine whether the test or the code is wrong and say so."""
