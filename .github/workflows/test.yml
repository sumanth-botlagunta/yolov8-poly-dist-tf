name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: |
          # Everything except the real-data smoke tests (which need TFDS_DATA_DIR).
          # The dry smoke loop (synthetic data) IS included.
          pytest -m "not smoke" -q
