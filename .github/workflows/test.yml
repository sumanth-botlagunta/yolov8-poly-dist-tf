name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: |
          # Everything except the real-data smoke tests (which need TFDS_DATA_DIR).
          # The dry smoke loop (synthetic data) IS included.
          pytest -m "not smoke" -q

      - name: Run multi-GPU (MirroredStrategy) tests
        run: |
          # Must run in a FRESH process: these split the CPU into 2 logical devices,
          # which only works before TF's device context is initialized. In the main
          # run above they self-skip (context already locked to 1 device).
          pytest tests/integration/test_multigpu.py -q
