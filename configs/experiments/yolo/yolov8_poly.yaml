# Experiment: yolov8_poly
# Pipeline: bbox + cls + polygon (24-vertex PolyYOLO). NO distance head.
# Standalone, self-contained config (no `base:` inheritance; every field below
# is the live value). Parallels yolov8_poly_dist.yaml with the distance
# head/stream disabled; diff the two to see what differs (with_distance,
# dist_gain, distance_data, etc.).

task:
  init_checkpoint: initial_checkpoint_folder/ckpt-920304
  init_checkpoint_modules: [backbone, decoder]
  num_classes: 39
  with_polygons: true
  with_distance: false          # ← disabled vs poly_dist
  min_distance: 0.5
  max_distance: 10.0
  output_poly_size: 24
  output_dist_size: 1
  num_dist_block: 1
  ignore_dontcare: true
  ignore_iscrowds: false
  iscrowds_labels: [6, 13, 24, 36, 37]
  smart_bias_lr: 0.1
  gradient_clip_norm: 0.0
  find_best_score_thresh: true
  summary_types: scalar,image
  summary_image_num: 20
  summary_image_draw_box: true
  summary_image_draw_poly: true
  per_category_metrics: false

  norm_activation:
    activation: relu
    norm_epsilon: 0.001
    norm_momentum: 0.97
    use_sync_bn: false

  model:
    input_size: [672, 672, 3]
    angle_step: 15
    deploy: true
    backbone:
      type: darknet
      darknet:
        model_id: cspdarknetv8s
        min_level: 3
        max_level: 5
        depth_scale: 1.0
        width_scale: 1.0
        use_separable_conv: false
    decoder:
      type: yolo_decoder
      yolo_decoder:
        version: v8
        type: s
        activation: same
        use_separable_conv: false
    head:
      smart_bias: true
    detection_generator:
      max_boxes: 300
      nms_thresh: 0.65

  losses:
    iou_gain: 7.5
    cls_gain: 0.5
    dfl_gain: 1.5
    dist_gain: 0.0              # ← zeroed — no distance head
    poly_dist_gain: 0.45
    poly_conf_gain: 0.2
    poly_angle_gain: 0.4
    poly_gain: 0.5
    tal_alpha: 0.5
    tal_beta: 6.0
    topk: 10
    acsl:
      use_acsl: false
      bg_common_ratio: 0.38
      bg_frequent_ratio: 1.0
      bg_rare_ratio: 0.17
      threshold: 0.3
      common_cls: [0, 2, 3, 4, 5, 11, 12, 13, 16, 17, 19, 20, 23, 24, 27, 28, 34, 36]
      frequent_cls: [18, 22, 25, 35]
      rare_cls: [1, 6, 7, 8, 9, 10, 14, 15, 21, 26, 29, 30, 31, 32, 33, 37]

  train_data:
    tfds_name: "cleaner_polygon2026:2.0.0,field_misrecog2026:1.0.0,station_misrecog:1.1.0"
    tfds_split: "train,train,train"
    tfds_sampling_weights: [95, 2, 3]
    tfds_data_dir: /home/user/tensorflow_datasets/
    tfds_for_cnp: "cleaner_copy_paste:1.0.0"
    tfds_for_cnp_split: train_f
    global_batch_size: 128
    is_training: true
    shuffle_buffer_size: 1500
    prob_copy_n_paste: 0.2
    seed: 1000
    drop_remainder: true
    with_polygons: true
    with_distance: false        # ← no distance labels needed
    class_remap_json_path: null
    distance_data: null         # ← no zip-merge with distance stream
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      aug_rand_hue: 0.015
      aug_rand_saturation: 0.7
      aug_rand_brightness: 0.4
      aug_rand_translate: 0.1
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      random_flip: true
      # Single-image (non-mosaic) pre-warp rotation, off. The mosaic path never
      # rotates regardless.
      rotate: false
      rotate_degrees: null
      resize_with_random_method: true
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 1.0
      jitter: 0.0
      mosaic:
        mosaic_frequency: 0.5
        mixup_frequency: 0.0
        mosaic_center: 0.25   # matches Mosaic.__init__ + the poly_dist tier
        # Canvas->output warp scale gain (stock YOLO [0.5, 1.5]) — the only source
        # of per-sample size variety. Per-image placement scale is fixed.
        aug_scale_min: 0.5
        aug_scale_max: 1.5
        # Per-tile random-window crop: off (0/0). Enable to crop a random window
        # (side fraction s ~ U[min, max]) of each tile before scaling it to the
        # quadrant.
        tile_crop_min: 0.0
        tile_crop_max: 0.0
        mosaic_crop_mode: scale
        # the mosaic path uses 0.5; the single-image path uses the parser-level
        # area_thresh (0.1) wired via single_area_thresh
        area_thresh: 0.5
        jitter: 0.0
        group_size: 32
        decodes_per_output: 4   # R: 4 = stock-YOLO (no reuse); lower = more reuse, less decode
        # random_perspective strength applied after mosaic assembly and to
        # non-mosaic single images. The mosaic path never rotates (wired to no
        # rotation in code); single-image rotation is the parser-level rotate /
        # rotate_degrees. shear off (0); aug_rand_translate is not the affine translate.
        shear: 0.0
        translate: 0.1

  validation_data:
    tfds_name: "cleaner_polygon2026:2.0.0"
    tfds_split: test
    tfds_data_dir: /home/user/tensorflow_datasets/
    global_batch_size: 64   # match the poly_dist tier
    is_training: false
    shuffle_buffer_size: 100
    prob_copy_n_paste: 0.0
    drop_remainder: false   # do not silently drop the last partial val batch
    with_polygons: true
    with_distance: false
    distance_data: null
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      aug_rand_hue: 0.0
      aug_rand_saturation: 0.0
      aug_rand_brightness: 0.0
      aug_rand_translate: 0.0
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      # Must be false for eval: V8ParserExtended._parse_eval_data never reads
      # random_flip (only _parse_train_data does), so a true here would imply
      # flips the eval path never applies.
      random_flip: false
      resize_with_random_method: false
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 0.0
      jitter: 0.0
      mosaic:
        mosaic_frequency: 0.0
        mixup_frequency: 0.0
        mosaic_center: 0.25   # matches Mosaic.__init__ + the poly_dist tier
        aug_scale_min: 1.0
        aug_scale_max: 1.0
        mosaic_crop_mode: null
        area_thresh: 0.1
        jitter: 0.0
        group_size: 32
        decodes_per_output: 4   # R: 4 = stock-YOLO (no reuse); lower = more reuse, less decode

trainer:
  train_epochs: 300
  # steps_per_loop / train_steps / validation_steps are auto-computed from
  # train_total_examples, validation_total_examples and the batch sizes — do not
  # hand-set them (hand-set step counts are ignored by the loader).
  train_total_examples: 271166   # verified against the TFDS builders
  validation_total_examples: 3903
  checkpoint_interval: 2118
  best_checkpoint_eval_metric: F1score50
  best_checkpoint_metric_comp: higher
  max_to_keep: 300
  optimizer_config:
    ema:
      average_decay: 0.9999
      dynamic_decay: true
    learning_rate:
      type: cosine
      cosine:
        name: CosineDecay
        initial_learning_rate: 0.01
        decay_steps: 635400   # = 2118 steps/epoch x 300 epochs
        alpha: 0.01
    optimizer:
      type: sgd
      sgd:
        name: SGD
        momentum: 0.937
        momentum_start: 0.8
        nesterov: true
        weight_decay: 0.0005
        warmup_steps: 6354   # 3 epochs x 2118
        # warmup_steps above is the sole SGD momentum/bias warmup control
        # (read by task.py via OptimizerConfig.warmup_steps).

runtime:
  distribution_strategy: mirrored
  num_gpus: 2
  mixed_precision_dtype: float32
  run_eagerly: false
  enable_xla: false
