# Experiment: yolov8_poly_dist_bf16
#
# Performance variant of yolov8_poly_dist.yaml (which runs float32): bfloat16
# compute — prediction heads stay float32 (pinned in models/head.py) and the
# loss runs float32, so no loss scaling is needed — plus XLA auto-clustering
# (tf.config.optimizer.set_jit), which tolerates the dynamic M_eff shapes in
# the TAL loss (clusters fall back where they can't compile). Do not combine
# with per-function jit_compile.
#
# Validate before a full run: train a few hundred steps, confirm no NaN/Inf and
# that box/cls/dfl curves track the float32 base, then benchmark the gain.

base: yolov8_poly_dist.yaml

runtime:
  mixed_precision_dtype: bfloat16
  enable_xla: true
