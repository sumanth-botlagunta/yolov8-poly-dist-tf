# Experiment: yolov8_poly_dist
# Full pipeline: bbox + cls + polygon (24-vertex PolyYOLO) + distance estimation
# This experiment YAML is itself the authoritative hyperparameter reference.

task:
  init_checkpoint: initial_checkpoint_folder/ckpt-920304
  init_checkpoint_modules: [backbone, decoder]
  num_classes: 39
  with_polygons: true
  with_distance: true
  min_distance: 0.5
  max_distance: 10.0
  output_poly_size: 24
  output_dist_size: 1
  num_dist_block: 1
  ignore_dontcare: true
  ignore_iscrowds: false
  iscrowds_labels: [6, 13, 24, 36, 37]
  smart_bias_lr: 0.1
  # Global-norm gradient clip (Ultralytics clips at 10.0 every step). 0 = off.
  # Applied after the cross-replica sum, before the weight-decay coupling
  # (optimizers/sgd_warmup.py), so it only trims pathological batches; a
  # healthy step's norm sits far below 10 (see the train/grad_norm TB scalar).
  gradient_clip_norm: 10.0
  find_best_score_thresh: true
  summary_types: scalar,image
  summary_image_num: 20
  summary_image_draw_box: true
  summary_image_draw_poly: true
  per_category_metrics: true

  norm_activation:
    activation: relu
    norm_epsilon: 0.001
    norm_momentum: 0.97
    use_sync_bn: false

  model:
    input_size: [672, 672, 3]
    angle_step: 15
    deploy: true
    backbone:
      type: darknet
      darknet:
        model_id: cspdarknetv8s
        min_level: 3
        max_level: 5
        depth_scale: 1.0
        width_scale: 1.0
        use_separable_conv: false
    decoder:
      type: yolo_decoder
      yolo_decoder:
        version: v8
        type: s
        activation: same
        use_separable_conv: false
    head:
      smart_bias: true
    detection_generator:
      max_boxes: 300
      nms_thresh: 0.65
      # Pre-NMS score floor (the legacy value). Only affects sub-0.05
      # detections in the mAP tail; F1score50 sweeps from 0.10 regardless.
      score_thresh: 0.001

  losses:
    # Positive weighting scheme: soft = per-anchor target_scores weighting /
    # target_scores_sum normalizer (the reference recipe; matches the legacy
    # codebase). legacy_hard = one-hot cls targets, binary fg weighting,
    # num_objs normalizer (kept selectable for A/B).
    weighting: soft
    iou_gain: 7.5
    cls_gain: 0.5
    dfl_gain: 1.5
    dist_gain: 1.0
    poly_dist_gain: 0.45
    poly_conf_gain: 0.2
    poly_angle_gain: 0.4
    poly_gain: 0.5
    tal_alpha: 0.5
    tal_beta: 6.0
    topk: 10
    acsl:
      use_acsl: false
      bg_common_ratio: 0.38
      bg_frequent_ratio: 1.0
      bg_rare_ratio: 0.17
      threshold: 0.3
      common_cls: [0, 2, 3, 4, 5, 11, 12, 13, 16, 17, 19, 20, 23, 24, 27, 28, 34, 36]
      frequent_cls: [18, 22, 25, 35]
      rare_cls: [1, 6, 7, 8, 9, 10, 14, 15, 21, 26, 29, 30, 31, 32, 33, 37]

  train_data:
    tfds_name: "cleaner_polygon2026:2.0.0,field_misrecog2026:1.0.0,station_misrecog:1.1.0"
    # Optional pre-resized 672² variants (cheaper decode, e.g. to afford a higher
    # decodes_per_output). Build ONCE, then swap (training only; keep validation
    # on the originals):
    #     --datasets cleaner_polygon2026:2.0.0,field_misrecog2026:1.0.0,station_misrecog:1.1.0
    # tfds_name: "cleaner_polygon2026_672:2.0.0,field_misrecog2026_672:1.0.0,station_misrecog_672:1.1.0"
    tfds_split: "train,train,train"
    # Weights bias the interleave ORDER only (each image is still seen exactly
    # once per lap). Proportional-to-source-size weights (268,384 / 416 / 2,366)
    # make all sources exhaust together, so the small misrecog sources spread
    # uniformly across the epoch. The old [95, 2, 3] over-drew them 13x/3.4x
    # their true rate, exhausting them ~8%/~29% into every lap and leaving the
    # epoch tail (and every epoch-boundary checkpoint) pure cleaner data.
    tfds_sampling_weights: [268384, 416, 2366]
    tfds_data_dir: /home/user/tensorflow_datasets/
    tfds_for_cnp: "cleaner_copy_paste:1.0.0"
    tfds_for_cnp_split: train_f
    global_batch_size: 128
    is_training: true
    # sized for the full multi-source detection stream (images stay encoded
    # through shuffle via SkipDecoding; ~30k encoded images is a few GB host RAM)
    shuffle_buffer_size: 30000
    # tf.data worker threads for the training pipeline (0 = all visible cores;
    # set to the real core quota on cgroup-capped machines).
    private_threadpool_size: 13
    prob_copy_n_paste: 0.2
    seed: 1000
    drop_remainder: true
    with_polygons: true
    with_distance: true
    class_remap_json_path: null
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      aug_rand_hue: 0.015
      aug_rand_saturation: 0.7
      aug_rand_brightness: 0.4
      aug_rand_translate: 0.1
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      random_flip: true
      # Single-image (non-mosaic) pre-warp rotation, off. The mosaic path never
      # rotates regardless.
      rotate: false
      rotate_degrees: null
      resize_with_random_method: true
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 1.0
      jitter: 0.0
      area_thresh: 0.1
      eval_gray_border: false
      mosaic:
        mosaic_frequency: 0.5
        mixup_frequency: 0.0
        mosaic_center: 0.25
        # Mosaics get one canvas->output warp with scale gain [0.4, 1.9] and
        # nothing else (no rotation, translate, shear, or perspective). Non-mosaic
        # singles get no scale gain and a small translate (parser.aug_scale_min/max
        # = 1.0 + parser.aug_rand_translate). Flip is per-tile inside the mosaic
        # and per single image; the assembled canvas is never mirrored.
        aug_scale_min: 0.4
        aug_scale_max: 1.9
        # Per-tile random-window crop: off (0/0). When enabled each tile crops a
        # random window of side fraction s ~ U[min, max] of its content and scales
        # it to the quadrant. Here size variety comes only from the [0.4, 1.9]
        # whole-canvas warp.
        tile_crop_min: 0.0
        tile_crop_max: 0.0
        # scale = legacy mode: 4 full-letterbox tiles on a fixed 2x grid, whole-
        # canvas pan by mosaic_center, one warp->output (every object keeps its
        # natural scale). crop = variable cells from a random split point.
        mosaic_crop_mode: scale
        # Mosaic-path candidate filter (legacy value 0.5): a box keeps its label
        # only if >= 50% of its area stays visible after the canvas warp
        # (clipped/warped ratio, scale-invariant). The single-image path uses the
        # parser-level area_thresh (0.1) wired via single_area_thresh.
        area_thresh: 0.5
        jitter: 0.0
        group_size: 32
        # R=1: each decoded image recurs in 4 outputs of its group (Sidon-shift
        # selection: any two outputs share at most one source, so no near-duplicate
        # samples). R=4 consumes 4x more distinct images per epoch at ~4x the
        # decode cost. The post-unbatch shuffle buffer (3072, input_reader.py)
        # disperses recurrences ~24 batches apart so same-batch reuse is rare.
        decodes_per_output: 1
        # Mosaic-path affine knobs (the single path uses the parser-level values).
        # The mosaic path never rotates (wired to 0 in code); shear 0; the
        # canvas->output warp translate matches legacy (0.1).
        shear: 0.0
        translate: 0.1
    distance_data:
      tfds_name: "servingbot_polygon:1.0.1"
      tfds_split: train
      tfds_data_dir: /home/user/tensorflow_datasets/
      global_batch_size: 16
      ignore_bg: true
      with_distance: true
      with_polygons: false
      drop_remainder: true
      # Shuffle-before-repeat: only this window mixes within a lap. At 200 the
      # 16 distance rows per step tracked shard read order (same scene/session
      # back to back). Records stay encoded through shuffle (SkipDecoding), so
      # a few thousand costs little host RAM.
      shuffle_buffer_size: 2000
      parser:
        angle_step: 15
        max_num_instances: 300
        max_vertices: 10938
        aug_rand_hue: 0.015
        aug_rand_saturation: 0.7
        aug_rand_brightness: 0.4
        random_flip: true
        skip_crowd_during_training: true
        with_polygons: true
        min_meter: 0.5
        max_meter: 10.0
        eval_gray_border: false

  validation_data:
    tfds_name: "cleaner_polygon2026:2.0.0"
    tfds_split: test
    tfds_data_dir: /home/user/tensorflow_datasets/
    global_batch_size: 64
    is_training: false
    shuffle_buffer_size: 100
    prob_copy_n_paste: 0.0
    drop_remainder: false
    with_polygons: true
    with_distance: false
    # Per-category eval metrics are enabled via task.per_category_metrics (above).
    distance_data: null
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      aug_rand_hue: 0.0
      aug_rand_saturation: 0.0
      aug_rand_brightness: 0.0
      aug_rand_translate: 0.0
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      # Eval is deterministic; the eval parse path never flips (a `true` here
      # would be ignored silently).
      random_flip: false
      resize_with_random_method: false
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 0.0
      jitter: 0.0
      area_thresh: 0.1
      eval_gray_border: false
      mosaic:
        mosaic_frequency: 0.0
        mixup_frequency: 0.0
        mosaic_center: 0.25
        aug_scale_min: 1.0
        aug_scale_max: 1.0
        mosaic_crop_mode: null
        area_thresh: 0.1
        jitter: 0.0
        group_size: 32
        decodes_per_output: 1   # R: 1 = each decode reused in 4 outputs (Sidon, <=1 shared source); 4 = stock-YOLO no-reuse at 4x decode cost

trainer:
  train_epochs: 300
  # restart policy: resume only from epoch-boundary checkpoints so every epoch
  # is one full uniform pass (set true to resume mid-epoch remainders instead)
  mid_epoch_resume: false
  # verified against the TFDS builders: cleaner_polygon2026 268,384 +
  # field_misrecog2026 416 + station_misrecog 2,366.
  train_total_examples: 271166
  validation_total_examples: 3903
  # steps_per_loop, train_steps, validation_steps auto-computed from the above
  best_checkpoint_eval_metric: F1score50
  best_checkpoint_metric_comp: higher
  max_to_keep: 300
  optimizer_config:
    ema:
      average_decay: 0.9999
      dynamic_decay: true
    learning_rate:
      type: cosine
      cosine:
        name: CosineDecay
        initial_learning_rate: 0.01
        # = steps_per_loop (2118 = 271,166 // 128) × train_epochs (300), so the
        # cosine reaches its alpha floor exactly at the end of training.
        decay_steps: 635400
        alpha: 0.01
    optimizer:
      type: sgd
      sgd:
        name: SGD
        momentum: 0.937
        momentum_start: 0.8
        nesterov: true
        weight_decay: 0.0005
        warmup_steps: 6354   # 3 epochs × 2118 steps
        # warmup_steps above is the sole SGD momentum/bias warmup control
        # (read by task.py via OptimizerConfig.warmup_steps).

runtime:
  # Single H100: one_device avoids MirroredStrategy variable wrapping overhead.
  distribution_strategy: one_device
  num_gpus: 1
  # float32 end to end — the reference precision for all runs. The bf16 + XLA
  # performance variant is the yolov8_poly_dist_bf16.yaml overlay.
  mixed_precision_dtype: float32
  run_eagerly: false
  enable_xla: false
  # Host CPU is cgroup-capped at ~13 cores while 128 are visible; cap TF's pools
  # to the real quota (tune if the cap changes). The training step is GPU-bound,
  # so its host pools get few threads and the quota is reserved for the tf.data
  # private pool (13 above). Total threads ~= quota avoids context-switch thrash.
  inter_op_threads: 2
  intra_op_threads: 4
