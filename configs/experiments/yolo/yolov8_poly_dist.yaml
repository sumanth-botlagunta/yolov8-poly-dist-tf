# Experiment: yolov8_poly_dist
# Full pipeline: bbox + cls + polygon (24-vertex PolyYOLO) + distance estimation
# This experiment YAML is itself the authoritative hyperparameter reference.

task:
  init_checkpoint: initial_checkpoint_folder/ckpt-920304
  init_checkpoint_modules: [backbone, decoder]
  num_classes: 39
  with_polygons: true
  with_distance: true
  min_distance: 0.5
  max_distance: 10.0
  output_poly_size: 24
  output_dist_size: 1
  num_dist_block: 1
  ignore_dontcare: true
  ignore_iscrowds: false
  iscrowds_labels: [6, 13, 24, 36, 37]
  smart_bias_lr: 0.1
  gradient_clip_norm: 0.0
  find_best_score_thresh: true
  summary_types: scalar,image
  summary_image_num: 20
  summary_image_draw_box: true
  summary_image_draw_poly: true
  per_category_metrics: true

  norm_activation:
    activation: relu
    norm_epsilon: 0.001
    norm_momentum: 0.97
    use_sync_bn: false

  model:
    input_size: [672, 672, 3]
    angle_step: 15
    darknet_based_model: false
    deploy: true
    backbone:
      type: darknet
      darknet:
        model_id: cspdarknetv8s
        min_level: 3
        max_level: 5
        depth_scale: 1.0
        width_scale: 1.0
        use_separable_conv: false
    decoder:
      type: yolo_decoder
      yolo_decoder:
        version: v8
        type: s
        activation: same
        use_separable_conv: false
    head:
      smart_bias: true
    anchor_boxes:
      anchors_per_scale: 1
      boxes: [[1, 1]]
      level_limits: null
    detection_generator:
      max_boxes: 300
      nms_thresh: 0.65
      score_thresh: 0.05
      topN_per_anchor: 1
      path_scales:
        '1': 2
        '2': 4
        '3': 8
        '4': 16
        '5': 32

  losses:
    iou_gain: 7.5
    cls_gain: 0.5
    dfl_gain: 1.5
    dist_gain: 1.0
    poly_dist_gain: 0.45
    poly_conf_gain: 0.2
    poly_angle_gain: 0.4
    # Halved from 0.5: the polygon head was over-served relative to the product
    # metric (poly_recall50 ~0.83 vs box recall50 ~0.70 on the same checkpoints)
    # while ~4/5 of the polygon share is the poly_angle BCE entropy floor —
    # gradient budget spent where F1 cannot benefit. Frees ~14% of the total
    # gradient toward box/cls/dfl; expected cost is a small poly_mIoU dip.
    poly_gain: 0.25
    tal_alpha: 0.5
    tal_beta: 6.0
    topk: 10
    acsl:
      use_acsl: false
      bg_common_ratio: 0.38
      bg_frequent_ratio: 1.0
      bg_rare_ratio: 0.17
      threshold: 0.3
      common_cls: [0, 2, 3, 4, 5, 11, 12, 13, 16, 17, 19, 20, 23, 24, 27, 28, 34, 36]
      frequent_cls: [18, 22, 25, 35]
      rare_cls: [1, 6, 7, 8, 9, 10, 14, 15, 21, 26, 29, 30, 31, 32, 33, 37]

  train_data:
    tfds_name: "cleaner_polygon2026:2.0.0,field_misrecog2026:1.0.0,station_misrecog:1.1.0"
    # Optional pre-resized 672² variants (cheaper decode, e.g. to afford a higher
    # decodes_per_output). Build ONCE, then swap (training only; keep validation
    # on the originals):
    #     --datasets cleaner_polygon2026:2.0.0,field_misrecog2026:1.0.0,station_misrecog:1.1.0
    # tfds_name: "cleaner_polygon2026_672:2.0.0,field_misrecog2026_672:1.0.0,station_misrecog_672:1.1.0"
    tfds_split: "train,train,train"
    tfds_sampling_weights: [95, 2, 3]
    tfds_data_dir: /home/user/tensorflow_datasets/
    tfds_for_cnp: "cleaner_copy_paste:1.0.0"
    tfds_for_cnp_split: train_f
    global_batch_size: 128
    is_training: true
    shuffle_buffer_size: 1500
    # tf.data worker threads for the training pipeline (0 = all visible cores;
    # set to the real core quota on cgroup-capped machines).
    private_threadpool_size: 13
    prob_copy_n_paste: 0.2
    seed: 1000
    drop_remainder: true
    with_polygons: true
    with_distance: true
    class_remap_json_path: null
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      # Resample polygons to 64 vertices at decode: every downstream stage
      # (copy-paste, padded_batch, mosaic point transforms, flip, radial target)
      # carries [N, 128] instead of [N, 3972]. The 24-bin radial target is exact
      # for polygons with <= 64 vertices and within sampling tolerance otherwise
      # (tests/test_polygon_preprocessing.py).
      resample_points: 0
      aug_rand_hue: 0.015
      aug_rand_saturation: 0.7
      aug_rand_brightness: 0.4
      aug_rand_translate: 0.1
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      # (aug_rand_angle / aug_rand_perspective removed: they were dead config — never
      #  applied. Geometric aug is the mosaic-stage random_perspective below, set via
      #  mosaic.degrees / mosaic.shear / mosaic.translate.)
      random_flip: true
      resize_with_random_method: true
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 1.0
      jitter: 0.0
      random_pad: false
      random_rotate: false
      best_match_only: false
      use_tie_breaker: true
      anchor_thresh: -0.01
      area_thresh: 0.1
      eval_gray_border: false
      mosaic:
        mosaic_frequency: 0.5
        mixup_frequency: 0.0
        mosaic_center: 0.25
        # Geometric augmentation = verified original-codebase parity: mosaics
        # get ONE canvas->output warp with scale gain [0.4, 1.9] and NOTHING
        # else (no rotation — the original hard-disabled it; no translate; no
        # shear/perspective). Non-mosaic singles get NO scale gain and a small
        # translate (parser.aug_scale_min/max=1.0 + parser.aug_rand_translate
        # below, wired to the Mosaic module's single path). Flip happens
        # per-TILE inside the mosaic (independent per tile) and per single
        # image — the assembled canvas is never mirrored.
        aug_scale_min: 0.4
        aug_scale_max: 1.9
        # Per-tile independent scale: OFF pending the original's per-tile
        # jitter magnitude (`random_crop` in its mosaic op — unresolved); the
        # confirmed original scale variety is the [0.4, 1.9] whole-canvas warp.
        tile_scale_min: 0.0
        tile_scale_max: 0.0
        mosaic_crop_mode: scale
        area_thresh: 0.5
        jitter: 0.0
        group_size: 32
        # R=1: each decoded image is reused in 4 outputs of its group (Sidon-shift
        # selection — any two outputs share at most ONE source image, so no
        # near-duplicate samples; stock-Ultralytics-like reuse semantics). R=4
        # consumes 4x more distinct images per epoch at ~4x the decode cost.
        # The post-unbatch shuffle buffer (3072, input_reader.py) disperses the
        # recurrences ~24 batches apart so same-batch reuse is rare.
        decodes_per_output: 1
        # Mosaic-path affine knobs (the single path uses the parser-level
        # values). Original-codebase parity: rotation fully OFF (rotate_prob
        # 0 — the original disabled mosaic rotation in code because polygon
        # rotation was unimplemented), translate 0, shear 0.
        degrees: 0.0
        rotate_prob: 0.0
        shear: 0.0
        translate: 0.0
    distance_data:
      tfds_name: "servingbot_polygon:1.0.1"
      tfds_split: train
      tfds_data_dir: /home/user/tensorflow_datasets/
      global_batch_size: 16
      ignore_bg: true
      with_distance: true
      with_polygons: false
      drop_remainder: true
      shuffle_buffer_size: 200
      parser:
        angle_step: 15
        max_num_instances: 300
        max_vertices: 10938
        # Shrink servingbot's [N, 10940] polygon tensors at decode (the distance
        # stream's letterbox transforms every vertex; same exactness guarantee
        # as the detection stream's resample).
        resample_points: 0
        aug_rand_hue: 0.015
        aug_rand_saturation: 0.7
        aug_rand_brightness: 0.4
        random_flip: true
        skip_crowd_during_training: true
        with_polygons: true
        min_meter: 0.5
        max_meter: 10.0
        eval_gray_border: false

  validation_data:
    tfds_name: "cleaner_polygon2026:2.0.0"
    tfds_split: test
    tfds_data_dir: /home/user/tensorflow_datasets/
    global_batch_size: 64
    is_training: false
    shuffle_buffer_size: 100
    prob_copy_n_paste: 0.0
    drop_remainder: false
    with_polygons: true
    with_distance: false
    # Per-category eval metrics are enabled via task.per_category_metrics (above).
    distance_data: null
    parser:
      angle_step: 15
      max_num_instances: 300
      max_vertices: 10938
      # Must match the training-stream resampling: arc-length resample makes
      # sparse annotations fill all boundary-crossed bins; eval GT must use the
      # same representation or poly_mIoU penalizes correct full-shape predictions.
      resample_points: 0
      aug_rand_hue: 0.0
      aug_rand_saturation: 0.0
      aug_rand_brightness: 0.0
      aug_rand_translate: 0.0
      aug_scale_min: 1.0
      aug_scale_max: 1.0
      # (aug_rand_angle / aug_rand_perspective removed: dead config, never applied.)
      # Evaluation is deterministic — the eval parse path never flips. This is
      # false to match reality; the eval parser would ignore `true` silently.
      random_flip: false
      resize_with_random_method: false
      skip_crowd_during_training: true
      dummy_distance: true
      with_polygons: true
      albumentations_frequency: 0.0
      jitter: 0.0
      random_pad: false
      random_rotate: false
      best_match_only: false
      use_tie_breaker: true
      anchor_thresh: -0.01
      area_thresh: 0.1
      eval_gray_border: false
      mosaic:
        mosaic_frequency: 0.0
        mixup_frequency: 0.0
        mosaic_center: 0.25
        aug_scale_min: 1.0
        aug_scale_max: 1.0
        mosaic_crop_mode: null
        area_thresh: 0.1
        jitter: 0.0
        group_size: 32
        decodes_per_output: 4   # R: 4 = stock-YOLO (no reuse); lower = more reuse, less decode

trainer:
  train_epochs: 300
  # verified against the actual TFDS builders:
  # cleaner_polygon2026 268,384 + field_misrecog2026 416 + station_misrecog 2,366.
  # (Was 305,780 — stale; it inflated steps/epoch to 2388 vs the true 2118.)
  train_total_examples: 271166
  validation_total_examples: 3903
  # steps_per_loop, train_steps, validation_steps auto-computed from the above
  best_checkpoint_eval_metric: F1score50
  best_checkpoint_metric_comp: higher
  max_to_keep: 300
  optimizer_config:
    ema:
      average_decay: 0.9999
      dynamic_decay: true
    learning_rate:
      type: cosine
      cosine:
        name: CosineDecay
        initial_learning_rate: 0.01
        # = steps_per_loop (2118 = 271,166 // 128) × train_epochs (300), so the
        # cosine reaches its alpha floor exactly at the end of training.
        decay_steps: 635400
        alpha: 0.01
    optimizer:
      type: sgd_legacy   # A/B probe: same update math on the legacy Keras optimizer base
      sgd:
        name: SGD
        momentum: 0.937
        momentum_start: 0.8
        nesterov: true
        weight_decay: 0.0005
        warmup_steps: 6354   # 3 epochs × 2118 steps
        weight_keys: [kernel, weight]
        bias_keys: [bias, beta]
        clipnorm: null
        clipvalue: null
        global_clipnorm: null
        decay: 0.0
        # warmup_steps above is the sole SGD momentum/bias warmup control
        # (read by task.py via OptimizerConfig.warmup_steps).

runtime:
  # A/B probe: disable oneDNN CPU-op rewrites (TF reads this at import time).
  disable_onednn: true
  # Single H100: one_device avoids MirroredStrategy variable wrapping overhead.
  distribution_strategy: one_device
  num_gpus: 1
  # bfloat16 on H100 Tensor Cores; prediction heads stay float32 (pinned in
  # models/head.py) and the loss runs in float32 — no loss scaling needed.
  mixed_precision_dtype: bfloat16
  run_eagerly: false
  enable_xla: false
  # Host CPU is cgroup-capped at ~13 cores while 128 are visible; cap TF's
  # pools to the real quota (tune on the machine if the cap changes).
  # The training step is GPU-bound, so its host pools get few threads; the
  # 13-core quota is reserved for the tf.data private pool (13 above). Total
  # threads ≈ quota avoids context-switch thrash (was 4+12+13 = 29 on 13 cores).
  inter_op_threads: 2
  intra_op_threads: 4
